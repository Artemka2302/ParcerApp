<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Парсер{% endblock %}</title>
    
    <!-- Минимальные стили -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            background: #f4f4f4;
        }
        
        /* Шапка */
        .header {
            background: #333;
            color: #fff;
            padding: 1rem;
            text-align: center;
        }
        
        .header h1 {
            margin: 0;
            font-size: 1.5rem;
        }
        
        /* Основной контент */
        .content {
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background: #fff;
            border-radius: 5px;
            min-height: 500px;
        }
        
        /* Футер */
        .footer {
            background: #333;
            color: #fff;
            text-align: center;
            padding: 1rem;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
        
        /* Кнопки */
        .btn {
            display: inline-block;
            background: #007bff;
            color: #fff;
            padding: 8px 16px;
            text-decoration: none;
            border-radius: 4px;
            border: none;
            cursor: pointer;
        }
        
        .btn:hover {
            background: #0056b3;
        }
        
        /* Формы */
        input, select {
            padding: 8px;
            margin: 5px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        
        /* Таблицы */
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
        }
        
        th, td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        th {
            background: #f4f4f4;
        }
        
        /* Ошибки */
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
        }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Верх (header) -->
    <div class="header">
        <h1>🚀 Мой Парсер</h1>
        <p>Парсинг веб-страниц</p>
    </div>
    
    <!-- Основной контент -->
    <div class="content">
        {% block content %}
        <!-- Сюда будет подставляться содержимое страниц -->
        {% endblock %}
    </div>
    
    <!-- Низ (footer) -->
    <div class="footer">
        <p>&copy; 2024 Мой Парсер. Все права защищены.</p>
    </div>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
